services:
  frontend-build:
    build:
      context: ./frontend
      target: builder
    volumes:
      - react_dist:/app/dist
    profiles:
      - build

  api:
    build: ./backend
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
      - react_dist:/app/app/static:ro
    env_file: .env
    restart: unless-stopped

  scheduler:
    build: ./backend
    command: python -m app.scheduler
    volumes:
      - db_data:/app/data
    env_file: .env
    restart: unless-stopped

volumes:
  db_data:
  react_dist:
